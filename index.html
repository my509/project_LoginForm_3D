<!DOCTYPE html>

<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tropical Glass Login</title>
     
    <link rel="stylesheet" href="style.css">

<body>

    <!-- Background Elements -->

    <div class="bg-image"></div>

    <div class="bg-overlay"></div>

    <!-- Main Card -->

    <div class="container">

        <div class="glass-card">

            

            <!-- Forms Container -->

            <div class="form-wrapper">

                

                <!-- LOGIN FORM -->

                <form id="login-form" class="form-section active" onsubmit="handleLogin(event)">

                    <h2>Welcome Back</h2>

                    <p class="subtitle">Enter your details to sign in</p>

                    <div class="input-group">

                        <input type="text" id="login-user" placeholder="Username" required>

                        <svg class="input-icon" viewBox="0 0 24 24">

                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>

                            <circle cx="12" cy="7" r="4"></circle>

                        </svg>

                    </div>

                    <div class="input-group">

                        <input type="password" id="login-pass" placeholder="Password" required>

                        <svg class="input-icon" viewBox="0 0 24 24">

                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>

                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>

                        </svg>

                    </div>

                    <div class="options">

                        <label class="remember-me">

                            <input type="checkbox"> Remember me

                        </label>

                        <a href="#" class="forgot-link">Forgot password?</a>

                    </div>

                    <button type="submit" class="btn">Sign In</button>

                    <!-- Social Login Section -->

                    <div class="social-divider">

                        <span>Or continue with</span>

                    </div>

                    <div class="social-icons">

                        <button type="button" class="social-btn google" title="Google">

                            <svg viewBox="0 0 24 24">

                                <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .533 5.347.533 12s5.333 12 11.947 12c3.44 0 6.1-1.147 8.16-3.293 2.093-2.107 2.68-5.333 2.68-7.92 0-.787-.08-1.547-.227-2.16H12.48z"/>

                            </svg>

                        </button>

                        <button type="button" class="social-btn apple" title="Apple">

                            <svg viewBox="0 0 24 24">

                                <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74s2.57-.99 4.31-.72c.73.03 2.28.27 3.32 1.79-.1.08-1.98 1.14-1.95 3.4.03 2.7 2.39 3.61 2.47 3.65-2.09 3.03-3.24 3.11-3.23 4.11zm-4.34-16.3c-.22 1.6-1.33 2.79-2.52 2.87-.33-1.57 1.14-2.85 2.52-2.87z"/>

                            </svg>

                        </button>

                        <button type="button" class="social-btn facebook" title="Facebook">

                            <svg viewBox="0 0 24 24">

                                <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.17 6 13.9 6c1.3 0 2.4.1 2.4.1v2.6h-1.35c-1.4 0-1.6.9-1.6 1.8V12h3l-1 3h-2v6.8c4.56-.93 8-4.96 8-9.8z"/>

                            </svg>

                        </button>

                    </div>

                    <div class="switch-text">

                        Don't have an account? <a onclick="switchView('register')">Register</a>

                    </div>

                </form>

                <!-- REGISTER FORM -->

                <form id="register-form" class="form-section" onsubmit="handleRegister(event)">

                    <h2>Create Account</h2>

                    <p class="subtitle">Join us and start your journey</p>

                    <div class="input-group">

                        <input type="text" id="reg-user" placeholder="Username" required>

                        <svg class="input-icon" viewBox="0 0 24 24">

                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>

                            <circle cx="12" cy="7" r="4"></circle>

                        </svg>

                    </div>

                    <div class="input-group">

                        <input type="email" id="reg-email" placeholder="Email Address" required>

                        <svg class="input-icon" viewBox="0 0 24 24">

                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>

                            <polyline points="22,6 12,13 2,6"></polyline>

                        </svg>

                    </div>

                    <div class="input-group">

                        <input type="password" id="reg-pass" placeholder="Password" required>

                        <svg class="input-icon" viewBox="0 0 24 24">

                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>

                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>

                        </svg>

                    </div>

                    <div class="input-group">

                        <input type="password" id="reg-confirm" placeholder="Confirm Password" required>

                        <svg class="input-icon" viewBox="0 0 24 24">

                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>

                        </svg>

                    </div>

                    <button type="submit" class="btn">Create Account</button>

                    

                     <!-- Social Login Section -->

                     <div class="social-divider">

                        <span>Or sign up with</span>

                    </div>

                    <div class="social-icons">

                        <button type="button" class="social-btn google" title="Google">

                            <svg viewBox="0 0 24 24">

                                <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .533 5.347.533 12s5.333 12 11.947 12c3.44 0 6.1-1.147 8.16-3.293 2.093-2.107 2.68-5.333 2.68-7.92 0-.787-.08-1.547-.227-2.16H12.48z"/>

                            </svg>

                        </button>

                        <button type="button" class="social-btn apple" title="Apple">

                            <svg viewBox="0 0 24 24">

                                <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74s2.57-.99 4.31-.72c.73.03 2.28.27 3.32 1.79-.1.08-1.98 1.14-1.95 3.4.03 2.7 2.39 3.61 2.47 3.65-2.09 3.03-3.24 3.11-3.23 4.11zm-4.34-16.3c-.22 1.6-1.33 2.79-2.52 2.87-.33-1.57 1.14-2.85 2.52-2.87z"/>

                            </svg>

                        </button>

                        <button type="button" class="social-btn facebook" title="Facebook">

                            <svg viewBox="0 0 24 24">

                                <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.17 6 13.9 6c1.3 0 2.4.1 2.4.1v2.6h-1.35c-1.4 0-1.6.9-1.6 1.8V12h3l-1 3h-2v6.8c4.56-.93 8-4.96 8-9.8z"/>

                            </svg>

                        </button>

                    </div>

                    <div class="switch-text">

                        Already have an account? <a onclick="switchView('login')">Login</a>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <!-- Custom Toast Notification -->

    <div id="toast">Message here</div>

    <script>

        // --- VIEW SWITCHING LOGIC ---

        const loginForm = document.getElementById('login-form');

        const registerForm = document.getElementById('register-form');

        const container = document.querySelector('.glass-card');

        function switchView(view) {

            if (view === 'register') {

                loginForm.classList.remove('active');

                loginForm.classList.add('inactive-left'); // Slide out to left

                

                setTimeout(() => {

                    registerForm.classList.remove('inactive-left');

                    registerForm.classList.add('active');

                }, 50); // Small delay for smoother feel

                

            } else {

                registerForm.classList.remove('active');

                // Normally register slides back to right, but simpler logic:

                // Just remove active, and let login slide back in from left

                

                loginForm.classList.remove('inactive-left');

                loginForm.classList.add('active');

            }

        }

        // --- VALIDATION & MOCK SUBMIT ---

        

        function showToast(message, type = 'success') {

            const toast = document.getElementById("toast");

            toast.textContent = message;

            

            // Reset classes

            toast.className = "show"; 

            if (type === 'error') toast.classList.add('error');

            

            // Hide after 3 seconds

            setTimeout(function(){ 

                toast.className = toast.className.replace("show", ""); 

            }, 3000);

        }

        function handleLogin(e) {

            e.preventDefault();

            const user = document.getElementById('login-user').value;

            const pass = document.getElementById('login-pass').value;

            // Simple validation simulation

            if (user && pass) {

                // Here you would normally send an AJAX request

                showToast(`Welcome back, ${user}! Redirecting...`, 'success');

                

                // Simulate redirect visual feedback

                document.querySelector('.btn').innerHTML = 'Signing in...';

                document.querySelector('.btn').style.opacity = '0.8';

            } else {

                showToast('Please fill in all fields.', 'error');

            }

        }

        function handleRegister(e) {

            e.preventDefault();

            const user = document.getElementById('reg-user').value;

            const email = document.getElementById('reg-email').value;

            const pass = document.getElementById('reg-pass').value;

            const confirm = document.getElementById('reg-confirm').value;

            // Validation

            if (pass !== confirm) {

                showToast('Passwords do not match!', 'error');

                return;

            }

            if (pass.length < 6) {

                showToast('Password must be at least 6 characters.', 'error');

                return;

            }

            // Success simulation

            showToast('Account created successfully! Please login.', 'success');

            

            // Clear inputs and switch to login after delay

            setTimeout(() => {

                document.getElementById('register-form').reset();

                switchView('login');

            }, 1500);

        }

    </script>

</body>

</html>
